server {
    listen 80;
    server_name dietetyk.renacode.com;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name renacode.com www.renacode.com;
    return 301 https://renacode.com$request_uri;
}

server {
    listen 443 ssl;
    server_name dietetyk.renacode.com;

    ssl_certificate /etc/letsencrypt/live/dietetyk.renacode.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dietetyk.renacode.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Domyślny limit nginx (1m) blokowałby duże payloady webhooka Apple Health
    # (eksport Treningów z Danymi Trasy/GPS) jeszcze przed dotarciem do backendu -
    # zwiększony, żeby dopasować do limitu express.json() w backend/server.js.
    client_max_body_size 20m;

    # Nagłówki bezpieczeństwa. Uwaga: Content-Security-Policy świadomie pominięty -
    # wymagałby pełnego audytu wszystkich źródeł inline-script/style/obrazów
    # używanych przez aplikację produkcyjną, żeby nie zablokować jej "na ślepo".
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://dietetyk-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

}

server {
    listen 443 ssl;
    server_name renacode.com www.renacode.com;

    ssl_certificate /etc/letsencrypt/live/renacode.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/renacode.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://renacode-landing:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

