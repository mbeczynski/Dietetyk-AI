name: Build i publikacja obrazów Docker

# Buduje obrazy backendu i frontendu przy każdym pushu na main i wypycha je do
# GitHub Container Registry (ghcr.io). Serwer produkcyjny tylko je pobiera
# (docker-compose pull) - nie trzyma już kodu źródłowego ani nie buduje lokalnie.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            dockerfile: ./docker/backend.Dockerfile
          - name: frontend
            dockerfile: ./docker/frontend.Dockerfile

    steps:
      - name: Checkout kodu
        uses: actions/checkout@v4

      - name: Logowanie do GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ustawienie Buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadane obrazu (tagi)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/dietetyk-ai-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build i push obrazu (${{ matrix.name }})
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
