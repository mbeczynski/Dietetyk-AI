name: Build i publikacja obrazów Docker

# Buduje obrazy backendu i frontendu przy każdym pushu na main i wypycha je do
# GitHub Container Registry (ghcr.io). Serwer produkcyjny tylko je pobiera
# (docker-compose pull) - nie trzyma już kodu źródłowego ani nie buduje lokalnie.
#
# Budowanie backendu i frontendu jest rozdzielone na dwa niezależne joby
# (build-backend, build-frontend). Dzięki filtrowi ścieżek (dorny/paths-filter)
# każdy z nich uruchamia się tylko wtedy, gdy zmieniły się pliki dotyczące
# danego serwisu - zmiana tylko w backendzie nie wywoła już zbędnego
# przebudowania i redeployu obrazu frontendu (i odwrotnie). Ręczne odpalenie
# przez "workflow_dispatch" zawsze buduje oba obrazy.
#
# Po zbudowaniu i wypchnięciu obrazów (CI), job "deploy" (CD) loguje się po SSH
# na serwer produkcyjny i odświeża kontenery (docker compose pull + up -d).
# Wymaga ustawienia w repo (Settings -> Secrets and variables -> Actions):
#   VPS_HOST     - adres IP lub domena serwera (np. 185.201.112.104)
#   VPS_USER     - dedykowany, NIEPRIVILEGOWANY użytkownik SSH (np. "deploy"),
#                  będący członkiem grupy "docker" - celowo NIE root. Patrz
#                  notatka w repo / wiadomość Claude z instrukcją utworzenia
#                  tego konta na serwerze.
#   VPS_SSH_KEY  - prywatny klucz SSH (klucz dedykowany tylko do CI/CD, którego
#                  publiczny odpowiednik trzeba dodać do ~/.ssh/authorized_keys
#                  konta "deploy" na serwerze)
#   VPS_SSH_PORT - (opcjonalnie) port SSH, domyślnie 22

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

permissions:
  contents: read
  packages: write

jobs:
  # Wykrywa, które części repo się zmieniły, żeby joby budujące backend/frontend
  # mogły się uruchamiać niezależnie od siebie tylko wtedy, gdy to konieczne.
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v5
      - name: Wykrywanie zmienionych ścieżek
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker/backend.Dockerfile'
            frontend:
              - 'frontend/**'
              - 'docker/frontend.Dockerfile'

  build-backend:
    name: Build i push obrazu (backend)
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v5

      # Skan podatności zależności npm. Działa tutaj (w CI), a nie lokalnie
      # w środowisku deweloperskim/sandboksie, bo CI ma realny dostęp do
      # rejestru npm. audit-level=high - nie blokujemy builda za drobne/niskie
      # podatności, ale wysokie/krytyczne mają od razu wstrzymać publikację obrazu.
      - name: Ustawienie Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm audit (backend)
        working-directory: ./backend
        run: |
          npm install --package-lock-only
          npm audit --audit-level=high

      - name: Logowanie do GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ustawienie Buildx
        uses: docker/setup-buildx-action@v4

      - name: Metadane obrazu (tagi)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/dietetyk-ai-backend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build i push obrazu backendu
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/backend.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    name: Build i push obrazu (frontend)
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v5

      - name: Ustawienie Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm audit (frontend)
        working-directory: ./frontend
        run: |
          npm install --package-lock-only
          npm audit --audit-level=high

      - name: Logowanie do GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ustawienie Buildx
        uses: docker/setup-buildx-action@v4

      - name: Metadane obrazu (tagi)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/dietetyk-ai-frontend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build i push obrazu frontendu
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/frontend.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Wdrożenie na serwer produkcyjny (CD)
    needs: [build-backend, build-frontend]
    # "always()" + sprawdzenie wyników: deploy ma się odbyć, jeśli żaden z jobów
    # budujących nie zakończył się błędem (skipped jest OK - to znaczy, że dany
    # serwis się nie zmienił, więc nie trzeba było go przebudowywać).
    if: |
      always() &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: SSH - docker compose pull && up -d + czekanie na healthcheck
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/dietetyk-ai
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

            echo "Czekam, aż dietetyk-backend zgłosi status 'healthy' (docker HEALTHCHECK -> GET /api/healthz)..."
            for i in $(seq 1 20); do
              status=$(docker inspect --format='{{.State.Health.Status}}' dietetyk-backend 2>/dev/null || echo "brak")
              echo "  [$i/20] status: $status"
              if [ "$status" = "healthy" ]; then
                echo "Backend jest healthy."
                exit 0
              fi
              if [ "$status" = "unhealthy" ]; then
                echo "BŁĄD: backend zgłosił status 'unhealthy'. Logi:"
                docker logs --tail 50 dietetyk-backend
                exit 1
              fi
              sleep 3
            done
            echo "BŁĄD: backend nie osiągnął statusu 'healthy' w wyznaczonym czasie. Logi:"
            docker logs --tail 50 dietetyk-backend
            exit 1

      - name: Weryfikacja health-checku end-to-end (przez domenę publiczną)
        run: |
          echo "Sprawdzam https://dietetyk.renacode.com/api/healthz z zewnątrz (przez nginx + SSL)..."
          for i in $(seq 1 10); do
            code=$(curl -s -o /tmp/healthz.json -w '%{http_code}' https://dietetyk.renacode.com/api/healthz || echo "000")
            echo "  [$i/10] HTTP $code"
            if [ "$code" = "200" ]; then
              echo "OK, odpowiedź:"
              cat /tmp/healthz.json
              exit 0
            fi
            sleep 3
          done
          echo "BŁĄD: /api/healthz nie odpowiedziało 200 po wdrożeniu."
          exit 1
