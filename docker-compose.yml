services:
  dietetyk-backend:
    image: ghcr.io/mbeczynski/dietetyk-ai-backend:latest
    container_name: dietetyk-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./backend/.env:/app/.env
    environment:
      - DATABASE_DIR=/app/data
      - PORT=3000
      - TZ=Europe/Warsaw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dietetyk-frontend:
    image: ghcr.io/mbeczynski/dietetyk-ai-frontend:latest
    container_name: dietetyk-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      dietetyk-backend:
        condition: service_healthy
      renacode-landing:
        condition: service_started
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  renacode-landing:
    build:
      context: ./../renacode.com
      dockerfile: Dockerfile
    container_name: renacode-landing
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dietetyk-db:
    image: coleifer/sqlite-web
    container_name: dietetyk-db
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./data:/data
    environment:
      - SQLITE_DATABASE=dietetyk.db
    depends_on:
      dietetyk-backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

