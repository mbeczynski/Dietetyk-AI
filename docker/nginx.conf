server {
    listen 80;
    server_name dietetyk.renacode.com;
    server_tokens off;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name renacode.com www.renacode.com;
    server_tokens off;
    return 301 https://renacode.com$request_uri;
}

server {
    listen 443 ssl;
    server_name dietetyk.renacode.com;

    # Nie ujawniaj wersji nginx w nagłówku Server: i na stronach błędów -
    # zbędna informacja zwiadowcza dla atakującego (znana wersja = znane CVE).
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/dietetyk.renacode.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dietetyk.renacode.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Domyślny limit nginx (1m) blokowałby duże payloady webhooka Apple Health
    # (eksport Treningów z Danymi Trasy/GPS) jeszcze przed dotarciem do backendu -
    # zwiększony, żeby dopasować do limitu express.json() w backend/server.js.
    client_max_body_size 20m;

    # Nagłówki bezpieczeństwa.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Content-Security-Policy dopasowany do realnych źródeł używanych przez frontend
    # (frontend/index.html, App.jsx, MealLogger.jsx):
    #   - script-src 'self': build Vite serwuje JS jako zewnętrzny plik z hashem w
    #     nazwie (<script type="module" src="/assets/...">), bez inline-skryptów.
    #   - style-src potrzebuje 'unsafe-inline', bo komponenty React w tej aplikacji
    #     intensywnie korzystają z atrybutu style={{...}} (inline style na elementach),
    #     a nie z arkuszy CSS - bez 'unsafe-inline' cały layout by się rozsypał.
    #     Plus fonts.googleapis.com - stąd ładowany jest arkusz czcionek Google Fonts.
    #   - font-src fonts.gstatic.com: tam Google Fonts faktycznie hostuje pliki czcionek.
    #   - img-src potrzebuje data: - awatar użytkownika, kod QR do 2FA i podglądy zdjęć
    #     posiłków są renderowane jako base64 data URI (<img src="data:...">), nie pliki.
    #   - connect-src 'self': wszystkie zapytania fetch() idą tylko do /api na tej samej
    #     domenie (patrz App.jsx) - żadnych zewnętrznych API wywoływanych z przeglądarki.
    #   - frame-ancestors 'self': odpowiednik X-Frame-Options SAMEORIGIN w samym CSP.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://dietetyk-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

}

server {
    listen 443 ssl;
    server_name renacode.com www.renacode.com;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/renacode.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/renacode.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://renacode-landing:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

