name: Build i publikacja obrazów Docker

# Buduje obrazy backendu i frontendu przy każdym pushu na main i wypycha je do
# GitHub Container Registry (ghcr.io). Serwer produkcyjny tylko je pobiera
# (docker-compose pull) - nie trzyma już kodu źródłowego ani nie buduje lokalnie.
#
# Budowanie backendu i frontendu jest rozdzielone na dwa niezależne joby
# (build-backend, build-frontend). Dzięki filtrowi ścieżek (dorny/paths-filter)
# każdy z nich uruchamia się tylko wtedy, gdy zmieniły się pliki dotyczące
# danego serwisu - zmiana tylko w backendzie nie wywoła już zbędnego
# przebudowania i redeployu obrazu frontendu (i odwrotnie). Ręczne odpalenie
# przez "workflow_dispatch" zawsze buduje oba obrazy.
#
# Po zbudowaniu i wypchnięciu obrazów (CI), job "deploy" (CD) loguje się po SSH
# na serwer produkcyjny i odświeża kontenery (docker compose pull + up -d).
# Wymaga ustawienia w repo (Settings -> Secrets and variables -> Actions):
#   VPS_HOST     - adres IP lub domena serwera (np. 185.201.112.104)
#   VPS_USER     - dedykowany, NIEPRIVILEGOWANY użytkownik SSH (np. "deploy"),
#                  będący członkiem grupy "docker" - celowo NIE root. Patrz
#                  notatka w repo / wiadomość Claude z instrukcją utworzenia
#                  tego konta na serwerze.
#   VPS_SSH_KEY  - prywatny klucz SSH (klucz dedykowany tylko do CI/CD, którego
#                  publiczny odpowiednik trzeba dodać do ~/.ssh/authorized_keys
#                  konta "deploy" na serwerze)
#   VPS_SSH_PORT - (opcjonalnie) port SSH, domyślnie 22

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

permissions:
  contents: write
  packages: write

jobs:
  # Wykrywa, które części repo się zmieniły, żeby joby budujące backend/frontend
  # mogły się uruchamiać niezależnie od siebie tylko wtedy, gdy to konieczne.
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v5
      - name: Wykrywanie zmienionych ścieżek
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker/backend.Dockerfile'
            frontend:
              - 'frontend/**'
              - 'docker/frontend.Dockerfile'

  # Testy/audyt bezpieczeństwa backendu - osobny job, ZANIM zaczniemy budować
  # i publikować obraz Docker. Wcześniej audyt był jednym ze stepów wewnątrz
  # joba budującego obraz - błąd audytu i błąd builda lądowały w tym samym
  # miejscu, co utrudniało odczytanie, co faktycznie nie przeszło. Rozdzielenie
  # na osobny job daje też gwarancję, że obraz NIGDY nie zostanie zbudowany
  # i wypchnięty z niezweryfikowanych zależności (build-backend rusza tylko,
  # gdy ten job zakończy się sukcesem - patrz `needs`/`if` poniżej).
  test-backend:
    name: Testy i audyt bezpieczeństwa (backend)
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v5

      - name: Ustawienie Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Osobny step tylko do wygenerowania package-lock.json (potrzebnego
      # `npm audit`) - nie instalujemy pełnego node_modules, bo go tu nie
      # potrzebujemy (obraz Docker instaluje zależności sam, w swoim builderze).
      - name: Instalacja zależności (lockfile)
        working-directory: ./backend
        run: npm install --package-lock-only

      # Skan podatności zależności npm. Działa tutaj (w CI), a nie lokalnie
      # w środowisku deweloperskim/sandboksie, bo CI ma realny dostęp do
      # rejestru npm. --omit=dev - audytujemy tylko zależności produkcyjne
      # (devDependencies, np. nodemon, nigdy nie trafiają do obrazu Docker).
      #
      # Wynik filtrujemy przez scripts/check-npm-audit.js, bo `npm audit`
      # samo w sobie nie odróżnia podatności w kodzie runtime od podatności
      # w narzędziach used tylko przy `npm ci` do skompilowania natywnego
      # bindingu sqlite3 (node-gyp -> tar/make-fetch-happen/cacache/
      # http-proxy-agent/@tootallnate/once). Próba "naprawienia" tego przez
      # podbicie sqlite3 na wersję główną faktycznie wysadziła produkcję
      # (prebuildowany binarz wymagał nowszego glibc niż ma node:20-slim -
      # ERR_DLOPEN_FAILED). Te konkretne pakiety są więc jawnie, z
      # uzasadnieniem, na białej liście - każda INNA podatność high/critical
      # (czyli realna zależność runtime) wciąż blokuje pipeline.
      #
      # "sqlite3" jest też na tej liście (poza samymi narzędziami
      # node-gyp/tar/...): `npm audit` "podciąga" ryzyko z całego łańcucha
      # transitive deps do bezpośredniej zależności w package.json, jeśli
      # jedyny sugerowany fix wymaga podbicia właśnie jej. Dlatego sqlite3
      # sam wychodzi jako "high" - to wciąż ten sam, już udokumentowany
      # problem (build-time-only), nie nowa, realna podatność runtime.
      - name: npm audit (backend)
        working-directory: ./backend
        run: |
          npm audit --omit=dev --json > /tmp/audit-backend.json || true
          node ../scripts/check-npm-audit.js /tmp/audit-backend.json "tar,@tootallnate/once,http-proxy-agent,make-fetch-happen,cacache,node-gyp,sqlite3"

      # Przekazujemy świeżo zregenerowany lockfile do joba build-backend
      # (osobny runner = osobny checkout, nie widzi plików z tego joba).
      # Dzięki temu `npm ci` w Dockerze zawsze dostaje lockfile zgodny
      # z aktualnym package.json, wygenerowany tu, w CI, gdzie jest realny
      # dostęp do rejestru npm - nikt nie musi odświeżać go ręcznie lokalnie.
      - name: Przekazanie zaktualizowanego lockfile do build-backend
        uses: actions/upload-artifact@v4
        with:
          name: backend-lockfile
          path: backend/package-lock.json
          retention-days: 1

  build-backend:
    name: Build i push obrazu (backend)
    needs: [changes, test-backend]
    if: |
      (needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') &&
      needs.test-backend.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v5

      - name: Pobranie zaktualizowanego lockfile z joba test-backend
        uses: actions/download-artifact@v4
        with:
          name: backend-lockfile
          path: backend

      - name: Logowanie do GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ustawienie Buildx
        uses: docker/setup-buildx-action@v4

      - name: Metadane obrazu (tagi)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/dietetyk-ai-backend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # Build i push są teraz osobnymi krokami: jeśli sam build (kompilacja
      # Dockerfile, npm ci w obrazie itd.) zawiedzie, nic nie trafia do
      # registry - krok push w ogóle się nie wykona. Wcześniej jeden krok
      # robił oba na raz, co utrudniało odróżnienie błędu builda od błędu
      # logowania/publikacji do ghcr.io.
      - name: Build obrazu backendu (bez push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/backend.Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Push obrazu backendu do registry
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/backend.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend

  # Analogiczny, osobny job audytu dla frontendu - patrz komentarz przy
  # test-backend powyżej (te samo uzasadnienie rozdzielenia od builda).
  test-frontend:
    name: Testy i audyt bezpieczeństwa (frontend)
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v5

      - name: Ustawienie Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalacja zależności (lockfile)
        working-directory: ./frontend
        run: npm install --package-lock-only

      - name: npm audit (frontend)
        working-directory: ./frontend
        run: npm audit --audit-level=high --omit=dev

      - name: Przekazanie zaktualizowanego lockfile do build-frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-lockfile
          path: frontend/package-lock.json
          retention-days: 1

  build-frontend:
    name: Build i push obrazu (frontend)
    needs: [changes, test-frontend]
    if: |
      (needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch') &&
      needs.test-frontend.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v5

      - name: Pobranie zaktualizowanego lockfile z joba test-frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-lockfile
          path: frontend

      - name: Logowanie do GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ustawienie Buildx
        uses: docker/setup-buildx-action@v4

      - name: Metadane obrazu (tagi)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/dietetyk-ai-frontend
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build obrazu frontendu (bez push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/frontend.Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Push obrazu frontendu do registry
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/frontend.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend

  test-e2e:
    name: Testy E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v5

      - name: Ustawienie Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalacja zależności (backend)
        working-directory: ./backend
        run: npm ci

      - name: Instalacja zależności i budowa (frontend)
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Instalacja zależności (root)
        run: npm ci

      - name: Instalacja przeglądarek Playwright
        run: npx playwright install --with-deps chromium

      - name: Uruchomienie testów E2E
        env:
          ADMIN_INITIAL_PASSWORD: 3bda877d518c8cf7a80b32bb
          APP_PASSWORD: dietetyk-admin
          CI: true
        run: npm run test:e2e

  update-git:
    name: Update Helm values in Git
    needs: [build-backend, build-frontend]
    if: |
      always() &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update image tags in values.yaml
        run: |
          sed -i '/backend:/,/tag:/ { s/tag: .*/tag: "sha-${{ steps.vars.outputs.sha_short }}"/ }' charts/dietetyk/values.yaml
          sed -i '/frontend:/,/tag:/ { s/tag: .*/tag: "sha-${{ steps.vars.outputs.sha_short }}"/ }' charts/dietetyk/values.yaml
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/dietetyk/values.yaml
          git commit -m "chore: update image tags to sha-${{ steps.vars.outputs.sha_short }} [skip ci]" || exit 0
          git push
